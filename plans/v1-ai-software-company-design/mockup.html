<!doctype html>
<!-- PROTOTYPE ONLY — in-memory clickable design exploration, not production code. -->
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sandcastle v1.0 Design Mockup</title>
    <style>
      :root {
        color-scheme: light;
        --canvas: #f4f6f8;
        --surface: #ffffff;
        --subtle: #f8fafc;
        --border: #d9e0e8;
        --border-strong: #c5cfdb;
        --text: #172033;
        --muted: #64748b;
        --brand: #2357d9;
        --brand-strong: #173ea6;
        --brand-soft: #eaf0ff;
        --success: #16875d;
        --success-soft: #e9f7f1;
        --warning: #c47a12;
        --warning-soft: #fff4dd;
        --danger: #c73b45;
        --danger-soft: #fff0f1;
        --purple: #7c5ac7;
        --teal: #168c99;
        --shadow:
          0 1px 2px rgb(15 23 42 / 0.05), 0 8px 24px rgb(15 23 42 / 0.06);
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        min-height: 100%;
      }
      body {
        font:
          14px/1.45 Inter,
          ui-sans-serif,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          "PingFang SC",
          sans-serif;
        color: var(--text);
        background: var(--canvas);
      }
      button,
      input,
      select {
        font: inherit;
      }
      button {
        cursor: pointer;
      }
      .app {
        display: grid;
        grid-template-columns: 244px minmax(0, 1fr);
        min-height: 100vh;
      }
      .sidebar {
        position: sticky;
        top: 0;
        height: 100vh;
        padding: 20px 14px 14px;
        display: flex;
        flex-direction: column;
        border-right: 1px solid var(--border);
        background: #fbfcfe;
      }
      .brand {
        padding: 0 10px 22px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .brand-mark {
        width: 36px;
        height: 36px;
        display: grid;
        place-items: center;
        border-radius: 10px;
        color: white;
        background: linear-gradient(145deg, var(--brand), #3b7bf0);
        font-weight: 900;
        box-shadow: 0 8px 18px rgb(35 87 217 / 0.22);
      }
      .brand-name {
        font-size: 17px;
        font-weight: 800;
        letter-spacing: -0.01em;
      }
      .company-name {
        color: var(--muted);
        font-size: 12px;
        font-weight: 650;
      }
      .nav {
        display: grid;
        gap: 5px;
      }
      .nav button {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 11px;
        border: 1px solid transparent;
        border-radius: 9px;
        padding: 10px 11px;
        color: #536179;
        background: transparent;
        text-align: left;
        font-weight: 700;
      }
      .nav button:hover {
        border-color: var(--border);
        color: var(--text);
      }
      .nav button.active {
        color: var(--brand);
        background: var(--brand-soft);
        border-color: #c8d7ff;
      }
      .nav-icon {
        width: 18px;
        text-align: center;
        font-size: 15px;
      }
      .sidebar-bottom {
        margin-top: auto;
        padding: 12px 6px 0;
        border-top: 1px solid var(--border);
      }
      .health {
        display: flex;
        gap: 8px;
        align-items: center;
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 10px;
      }
      .health-dot {
        width: 8px;
        height: 8px;
        background: var(--success);
        border-radius: 999px;
        box-shadow: 0 0 0 3px var(--success-soft);
      }
      .language-switch {
        display: grid;
        grid-template-columns: 1fr 1fr;
        padding: 3px;
        background: #edf1f6;
        border-radius: 8px;
      }
      .language-switch button {
        border: 0;
        border-radius: 6px;
        padding: 6px;
        color: var(--muted);
        background: transparent;
        font-size: 12px;
        font-weight: 750;
      }
      .language-switch button.active {
        color: var(--text);
        background: white;
        box-shadow: 0 1px 4px rgb(15 23 42 / 0.12);
      }
      .workspace {
        min-width: 0;
      }
      .topbar {
        height: 66px;
        padding: 0 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--border);
        background: rgb(255 255 255 / 0.92);
        backdrop-filter: blur(14px);
      }
      .crumbs {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 12px;
      }
      .crumbs strong {
        color: var(--text);
        font-size: 14px;
      }
      .top-actions {
        display: flex;
        align-items: center;
        gap: 9px;
      }
      .search {
        width: 260px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--subtle);
        color: var(--muted);
        padding: 8px 10px;
      }
      .button {
        border: 1px solid var(--border-strong);
        border-radius: 8px;
        padding: 8px 12px;
        background: white;
        color: var(--text);
        font-weight: 750;
      }
      .button.primary {
        background: var(--brand);
        border-color: var(--brand);
        color: white;
      }
      .button.warning {
        background: var(--warning);
        border-color: var(--warning);
        color: white;
      }
      .notification {
        position: relative;
        width: 34px;
        height: 34px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: white;
      }
      .notification::after {
        content: "2";
        position: absolute;
        top: -6px;
        right: -5px;
        width: 17px;
        height: 17px;
        display: grid;
        place-items: center;
        color: white;
        background: var(--danger);
        border-radius: 999px;
        font-size: 10px;
        font-weight: 800;
      }
      main {
        padding: 26px 28px 38px;
      }
      .page-header {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        align-items: flex-start;
        margin-bottom: 20px;
      }
      .eyebrow {
        color: var(--brand);
        font-size: 11px;
        font-weight: 850;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      h1 {
        margin: 5px 0 5px;
        font-size: 27px;
        line-height: 1.1;
        letter-spacing: -0.025em;
      }
      h2 {
        margin: 0;
        font-size: 16px;
      }
      h3 {
        margin: 0;
        font-size: 14px;
      }
      p {
        margin: 0;
        color: var(--muted);
      }
      .header-actions {
        display: flex;
        gap: 9px;
      }
      .metrics {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 16px;
      }
      .card {
        border: 1px solid var(--border);
        border-radius: 11px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }
      .metric {
        padding: 15px 16px;
        min-height: 106px;
        position: relative;
        overflow: hidden;
      }
      .metric::before {
        content: "";
        position: absolute;
        inset: 0 0 auto;
        height: 3px;
        background: var(--brand);
      }
      .metric.warning::before {
        background: var(--warning);
      }
      .metric.danger::before {
        background: var(--danger);
      }
      .metric.success::before {
        background: var(--success);
      }
      .metric-label {
        color: var(--muted);
        font-size: 12px;
        font-weight: 750;
      }
      .metric-value {
        display: block;
        margin-top: 12px;
        font-size: 29px;
        line-height: 1;
        letter-spacing: -0.03em;
      }
      .metric-foot {
        display: block;
        margin-top: 9px;
        color: var(--muted);
        font-size: 11px;
      }
      .overview-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.65fr) minmax(330px, 0.75fr);
        gap: 16px;
      }
      .stack {
        display: grid;
        gap: 16px;
        align-content: start;
      }
      .section-head {
        padding: 16px 17px 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--border);
      }
      .section-head span {
        color: var(--muted);
        font-size: 12px;
      }
      .attention-list,
      .run-list,
      .artifact-list {
        display: grid;
      }
      .attention-item,
      .run-row,
      .artifact-row {
        padding: 13px 16px;
        display: grid;
        align-items: center;
        gap: 12px;
        border-bottom: 1px solid #edf1f5;
      }
      .attention-item:last-child,
      .run-row:last-child,
      .artifact-row:last-child {
        border-bottom: 0;
      }
      .attention-item {
        grid-template-columns: 9px minmax(0, 1fr) auto;
      }
      .attention-bar {
        width: 7px;
        height: 38px;
        border-radius: 9px;
        background: var(--warning);
      }
      .attention-bar.danger {
        background: var(--danger);
      }
      .item-title {
        font-weight: 780;
      }
      .item-meta {
        color: var(--muted);
        font-size: 12px;
        margin-top: 3px;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        width: fit-content;
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 4px 8px;
        color: var(--muted);
        background: var(--subtle);
        font-size: 11px;
        font-weight: 800;
        white-space: nowrap;
      }
      .pill.warning {
        color: #8b570a;
        background: var(--warning-soft);
        border-color: #f0d198;
      }
      .pill.danger {
        color: #9f2f38;
        background: var(--danger-soft);
        border-color: #efbcc1;
      }
      .pill.success {
        color: #0f6947;
        background: var(--success-soft);
        border-color: #b9e2d1;
      }
      .pill.brand {
        color: var(--brand-strong);
        background: var(--brand-soft);
        border-color: #c8d7ff;
      }
      .run-row {
        grid-template-columns:
          minmax(0, 1.6fr) minmax(120px, 0.7fr) minmax(110px, 0.55fr)
          auto;
      }
      .progress {
        height: 7px;
        border-radius: 999px;
        background: #e9edf3;
        overflow: hidden;
        margin-top: 7px;
      }
      .progress > span {
        display: block;
        height: 100%;
        background: var(--brand);
        border-radius: inherit;
      }
      .department-grid {
        padding: 14px;
        display: grid;
        gap: 10px;
      }
      .department-card {
        padding: 13px;
        border: 1px solid var(--border);
        border-radius: 9px;
        background: var(--subtle);
      }
      .department-title {
        display: flex;
        justify-content: space-between;
        gap: 8px;
      }
      .people {
        display: flex;
        align-items: center;
        margin-top: 12px;
      }
      .avatar {
        width: 28px;
        height: 28px;
        margin-right: -5px;
        display: grid;
        place-items: center;
        border: 2px solid white;
        border-radius: 999px;
        color: white;
        background: var(--brand);
        font-size: 10px;
        font-weight: 850;
      }
      .avatar.purple {
        background: var(--purple);
      }
      .avatar.teal {
        background: var(--teal);
      }
      .avatar.green {
        background: var(--success);
      }
      .artifact-row {
        grid-template-columns: 34px minmax(0, 1fr) auto;
      }
      .artifact-icon {
        width: 32px;
        height: 32px;
        display: grid;
        place-items: center;
        border-radius: 8px;
        color: var(--brand);
        background: var(--brand-soft);
        font-weight: 900;
      }

      /* Pipeline */
      .subnav {
        display: flex;
        gap: 5px;
        margin: -6px 0 16px;
        border-bottom: 1px solid var(--border);
      }
      .subnav button {
        border: 0;
        border-bottom: 2px solid transparent;
        padding: 10px 12px;
        color: var(--muted);
        background: transparent;
        font-weight: 750;
      }
      .subnav button.active {
        color: var(--brand);
        border-bottom-color: var(--brand);
      }
      .pipeline-shell {
        height: 680px;
        display: grid;
        grid-template-columns: 178px minmax(0, 1fr) 292px;
        overflow: hidden;
      }
      .node-library,
      .inspector {
        background: #fbfcfe;
      }
      .node-library {
        border-right: 1px solid var(--border);
        padding: 14px;
      }
      .inspector {
        border-left: 1px solid var(--border);
        overflow: auto;
      }
      .panel-title {
        margin-bottom: 12px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 850;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .node-kind {
        margin-bottom: 8px;
        padding: 9px 10px;
        display: flex;
        align-items: center;
        gap: 9px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: white;
        font-size: 12px;
        font-weight: 750;
      }
      .node-kind i {
        width: 9px;
        height: 9px;
        border-radius: 3px;
        background: var(--brand);
      }
      .node-kind.approval i {
        background: var(--warning);
      }
      .node-kind.condition i {
        background: var(--purple);
        transform: rotate(45deg);
        border-radius: 2px;
      }
      .node-kind.parallel i {
        background: var(--teal);
      }
      .node-kind.complete i {
        background: var(--success);
        border-radius: 999px;
      }
      .canvas {
        position: relative;
        overflow: hidden;
        background-color: #f7f9fc;
        background-image: radial-gradient(#d9e0e8 1px, transparent 1px);
        background-size: 20px 20px;
      }
      .canvas-toolbar {
        position: absolute;
        z-index: 5;
        top: 12px;
        left: 12px;
        right: 12px;
        display: flex;
        justify-content: space-between;
      }
      .toolbar-group {
        display: flex;
        gap: 6px;
        padding: 4px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: rgb(255 255 255 / 0.92);
        box-shadow: var(--shadow);
      }
      .toolbar-group button {
        min-width: 30px;
        border: 0;
        border-radius: 6px;
        padding: 5px 8px;
        color: var(--muted);
        background: transparent;
        font-weight: 750;
      }
      .toolbar-group button.active {
        color: var(--brand);
        background: var(--brand-soft);
      }
      .pipeline-svg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }
      .pipeline-node {
        position: absolute;
        z-index: 2;
        width: 178px;
        padding: 12px;
        border: 1px solid #b9c8e8;
        border-left: 4px solid var(--brand);
        border-radius: 10px;
        background: white;
        box-shadow: var(--shadow);
      }
      .pipeline-node.selected {
        outline: 3px solid rgb(35 87 217 / 0.16);
        border-color: var(--brand);
      }
      .pipeline-node.approval {
        border-left-color: var(--warning);
      }
      .pipeline-node.parallel {
        border-left-color: var(--teal);
      }
      .pipeline-node.complete {
        border-left-color: var(--success);
      }
      .node-type {
        color: var(--muted);
        font-size: 9px;
        font-weight: 850;
        letter-spacing: 0.07em;
        text-transform: uppercase;
      }
      .node-name {
        margin-top: 5px;
        font-size: 13px;
        font-weight: 800;
      }
      .node-person {
        margin-top: 9px;
        display: flex;
        gap: 7px;
        align-items: center;
        color: var(--muted);
        font-size: 10px;
      }
      .node-person .avatar {
        width: 23px;
        height: 23px;
        margin: 0;
        border: 0;
      }
      .node-chip {
        margin-top: 8px;
        display: inline-block;
        padding: 3px 6px;
        border-radius: 5px;
        color: var(--brand-strong);
        background: var(--brand-soft);
        font-size: 9px;
        font-weight: 800;
      }
      .inspector-head {
        padding: 15px 16px;
        border-bottom: 1px solid var(--border);
      }
      .inspector-body {
        padding: 15px 16px;
      }
      .field {
        margin-bottom: 14px;
      }
      .field label {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 750;
      }
      .field-box {
        min-height: 36px;
        padding: 8px 9px;
        border: 1px solid var(--border);
        border-radius: 7px;
        background: white;
        font-size: 12px;
      }
      .skill-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
      }

      /* Run */
      .run-layout {
        display: grid;
        grid-template-columns: 220px minmax(0, 1fr) 310px;
        gap: 14px;
        align-items: start;
      }
      .timeline {
        padding: 12px;
      }
      .timeline-item {
        position: relative;
        padding: 10px 8px 13px 34px;
      }
      .timeline-item::before {
        content: "";
        position: absolute;
        left: 15px;
        top: 25px;
        bottom: -11px;
        width: 1px;
        background: var(--border);
      }
      .timeline-item:last-child::before {
        display: none;
      }
      .timeline-dot {
        position: absolute;
        left: 7px;
        top: 12px;
        width: 17px;
        height: 17px;
        display: grid;
        place-items: center;
        border: 2px solid var(--border-strong);
        border-radius: 999px;
        color: white;
        background: white;
        font-size: 9px;
        font-weight: 900;
      }
      .timeline-item.done .timeline-dot {
        border-color: var(--success);
        background: var(--success);
      }
      .timeline-item.current .timeline-dot {
        border-color: var(--warning);
        background: var(--warning);
        box-shadow: 0 0 0 4px var(--warning-soft);
      }
      .timeline-name {
        font-size: 12px;
        font-weight: 800;
      }
      .timeline-meta {
        margin-top: 2px;
        color: var(--muted);
        font-size: 10px;
      }
      .current-node {
        overflow: hidden;
      }
      .approval-banner {
        padding: 14px 16px;
        display: flex;
        gap: 12px;
        align-items: center;
        border-bottom: 1px solid #f0d198;
        background: var(--warning-soft);
      }
      .approval-symbol {
        width: 36px;
        height: 36px;
        display: grid;
        place-items: center;
        border-radius: 9px;
        color: white;
        background: var(--warning);
        font-weight: 900;
      }
      .node-content {
        padding: 17px;
      }
      .summary-box {
        margin-top: 13px;
        padding: 13px;
        border: 1px solid var(--border);
        border-radius: 9px;
        background: var(--subtle);
      }
      .change-list {
        margin: 10px 0 0;
        padding-left: 18px;
        color: #36445c;
      }
      .change-list li {
        margin: 5px 0;
      }
      .artifact-preview {
        margin-top: 14px;
        border: 1px solid var(--border);
        border-radius: 9px;
        overflow: hidden;
      }
      .artifact-preview-head {
        padding: 10px 12px;
        display: flex;
        justify-content: space-between;
        border-bottom: 1px solid var(--border);
        background: #fbfcfe;
      }
      .artifact-preview-body {
        padding: 13px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .preview-file {
        padding: 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
      }
      .review-panel {
        position: sticky;
        top: 80px;
        overflow: hidden;
      }
      .review-section {
        padding: 14px 15px;
        border-bottom: 1px solid var(--border);
      }
      .review-section:last-child {
        border-bottom: 0;
      }
      .kv {
        margin-top: 9px;
        display: grid;
        grid-template-columns: 82px 1fr;
        gap: 7px;
        color: var(--muted);
        font-size: 11px;
      }
      .kv strong {
        color: var(--text);
      }
      .review-actions {
        display: grid;
        gap: 8px;
      }
      .review-actions .button {
        width: 100%;
      }

      /* Agent interaction */
      .interaction-layout {
        display: grid;
        grid-template-columns: 250px minmax(0, 1fr) 300px;
        gap: 14px;
        align-items: start;
      }
      .session-panel,
      .context-panel {
        overflow: hidden;
      }
      .employee-profile {
        padding: 16px;
        border-bottom: 1px solid var(--border);
      }
      .employee-line {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .employee-line .avatar {
        width: 38px;
        height: 38px;
        margin: 0;
        border: 0;
      }
      .session-list {
        padding: 10px;
      }
      .session-item {
        margin-bottom: 7px;
        padding: 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--subtle);
      }
      .session-item.active {
        border-color: #b8caff;
        background: var(--brand-soft);
      }
      .connection {
        padding: 13px 15px;
        border-top: 1px solid var(--border);
        background: #fbfcfe;
      }
      .conversation {
        min-height: 690px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .conversation-head {
        padding: 13px 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--border);
      }
      .conversation-stream {
        flex: 1;
        padding: 16px;
        display: grid;
        gap: 12px;
        align-content: start;
        background: #fbfcfe;

          overlay = null;
          render();

        }

          const name = document.getElementById("new-project-name").value.trim();
          const goal = document.getElementById("new-project-goal").value.trim();

            ),
          );
          return;
        }
        if (action === "reject-run" || action === "cancel-run") {
          prototypeState.runStatus = "cancelled";
          showToast(
            l(
              "运行已取消，已有产物和证据已保留。",
              "Run cancelled. Existing artifacts and evidence were preserved.",
            ),
          );
          return;
        }
        if (action === "pause-run") {
          prototypeState.runStatus =
            prototypeState.runStatus === "paused" ? "running" : "paused";
          showToast(
            prototypeState.runStatus === "paused"
              ? l("运行已在安全边界暂停。", "Run paused at a safe boundary.")
              : l(
                  "Agent 已从同一快照恢复。",
                  "Agent resumed from the same snapshot.",
                ),
          );
          return;
        }
        if (action === "resume-run") {
          prototypeState.runStatus = "running";
          showToast(
            l(
              "运行已从快照 sc-dev-v4.2 恢复。",
              "Run resumed from snapshot sc-dev-v4.2.",
            ),
          );
          return;
        }
        if (
          ["permission-once", "permission-run", "permission-deny"].includes(
            action,
          )
        ) {
          prototypeState.permission =
            action === "permission-deny"
              ? "denied"
              : action === "permission-run"
                ? "allowed-for-run"
                : "allowed-once";
          showToast(
            `${l("权限决定已记录", "Permission decision recorded")}: ${statusLabel(prototypeState.permission)}`,
          );
          return;
        }
        if (action === "send-feedback") {
          const input = document.getElementById("interaction-input");
          const message = input.value.trim();
          if (!message) {
            showToast(l("请先输入节点反馈。", "Enter node feedback first."));
            return;
          }
          prototypeState.interactionMessages.push(message);
          showToast(
            l(
              "反馈已记录到当前节点，并通过 ACP 发送。",
              "Feedback recorded on the current node and sent through ACP.",
            ),
          );
          return;
        }
        if (action === "reference-artifact") {
          const input = document.getElementById("interaction-input");
          input.value = `${input.value}${input.value ? "\n" : ""}@technical-plan.md:v2 `;
          input.focus();
          return;
        }
        if (action === "raw-evidence") {
          showToast(
            l(
              "证据抽屉：RuntimeEvent、原始日志、命令输出和 ACP 更新。",
              "Evidence drawer: RuntimeEvent, raw logs, command output, and ACP updates.",
            ),
          );
          return;
        }
        if (action === "end-session") {
          showToast(
            l(
              "ACP 会话已结束，运行和产物仍然保留。",
              "ACP session ended. Run and artifacts remain available.",
            ),
          );
          return;
        }
        if (action === "provider-test") {
          showToast(
            l(
              "执行服务健康检查通过，耗时 420 毫秒。",
              "Provider health check passed in 420 ms.",
            ),
          );
          return;
        }
      }
      render();
    </script>
  </body>
</html>
